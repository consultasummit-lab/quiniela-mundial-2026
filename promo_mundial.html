<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Mundial - Registro de Participantes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Fraunces:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&display=swap');

  :root {
    --ca-gold: #ebb654;
    --ca-black: #0d0d0d;
    --ca-cream: #f4ecd8;
    --er-pink: #f338cb;
    --er-blue: #2f4e90;
    --er-light: #fff5fb;
    --neutral-bg: #f7f5f1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--neutral-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #1a1a1a;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  /* ===== SELECTOR DE NEGOCIO ===== */
  .selector {
    text-align: center;
  }

  .selector-header {
    margin-bottom: 28px;
  }

  .selector-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #1a1a1a;
  }

  .selector-header p {
    margin-top: 6px;
    font-size: 14px;
    color: #6b6b6b;
  }

  .biz-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .biz-card {
    border: none;
    border-radius: 18px;
    padding: 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-align: left;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    font-family: inherit;
  }

  .biz-card:hover {
    transform: translateY(-2px);
  }

  .biz-card:focus-visible {
    outline: 3px solid #333;
    outline-offset: 2px;
  }

  .biz-card.ca {
    background: var(--ca-black);
    color: var(--ca-cream);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }

  .biz-card.er {
    background: white;
    color: var(--er-blue);
    border: 2px solid var(--er-blue);
    box-shadow: 0 6px 20px rgba(47,78,144,0.12);
  }

  .biz-card img.thumb {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .biz-card.ca img.thumb {
    border: 2px solid var(--ca-gold);
  }

  .biz-card.er img.thumb {
    border: 2px solid var(--er-pink);
    background: var(--er-light);
  }

  .biz-card .biz-info .name {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 700;
  }

  .biz-card.er .biz-info .name {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
  }

  .biz-card .biz-info .tagline {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 3px;
  }

  .biz-card.ca .biz-info .tagline {
    color: var(--ca-gold);
  }

  .biz-card.er .biz-info .tagline {
    color: var(--er-pink);
  }

  /* ===== VISTA DE NEGOCIO (FORM / FOLIO) ===== */
  .biz-view {
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }

  .biz-view.ca {
    background: linear-gradient(165deg, #1a1410 0%, var(--ca-black) 60%);
    color: var(--ca-cream);
  }

  .biz-view.er {
    background: var(--er-light);
    color: #2a2a2a;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
  }

  .biz-view.ca .topbar {
    border-bottom: 1px solid rgba(235,182,84,0.25);
  }

  .biz-view.er .topbar {
    border-bottom: 2px solid var(--er-pink);
    background: white;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 8px;
    font-family: inherit;
  }

  .biz-view.ca .back-btn {
    color: var(--ca-gold);
  }

  .biz-view.ca .back-btn:hover {
    background: rgba(235,182,84,0.1);
  }

  .biz-view.er .back-btn {
    color: var(--er-blue);
  }

  .biz-view.er .back-btn:hover {
    background: rgba(47,78,144,0.08);
  }

  .topbar-logo {
    height: 28px;
    object-fit: contain;
  }

  .content {
    padding: 28px 24px 32px;
  }

  .promo-banner {
    text-align: center;
    margin-bottom: 22px;
  }

  .promo-banner .eyebrow {
    font-size: 12px;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .biz-view.ca .promo-banner .eyebrow {
    color: var(--ca-gold);
  }

  .biz-view.er .promo-banner .eyebrow {
    color: var(--er-pink);
  }

  .promo-banner h2 {
    margin-top: 6px;
    font-size: 24px;
  }

  .biz-view.ca .promo-banner h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
  }

  .biz-view.er .promo-banner h2 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    color: var(--er-blue);
  }

  .promo-banner .sub {
    font-size: 13px;
    margin-top: 6px;
    opacity: 0.75;
  }

  /* ===== FORM ===== */
  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .biz-view.ca .form-group label {
    color: var(--ca-gold);
  }

  .biz-view.er .form-group label {
    color: var(--er-blue);
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    border: none;
    outline: none;
  }

  .biz-view.ca .form-group input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(235,182,84,0.3);
    color: var(--ca-cream);
  }

  .biz-view.ca .form-group input::placeholder {
    color: rgba(244,236,216,0.35);
  }

  .biz-view.ca .form-group input:focus {
    border-color: var(--ca-gold);
    box-shadow: 0 0 0 3px rgba(235,182,84,0.15);
  }

  .biz-view.er .form-group input {
    background: white;
    border: 2px solid #e0d8ec;
    color: #2a2a2a;
  }

  .biz-view.er .form-group input:focus {
    border-color: var(--er-pink);
    box-shadow: 0 0 0 3px rgba(243,56,203,0.12);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    font-family: inherit;
    transition: transform 0.1s ease, opacity 0.15s ease;
    letter-spacing: 0.5px;
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .biz-view.ca .submit-btn {
    background: var(--ca-gold);
    color: var(--ca-black);
  }

  .biz-view.ca .submit-btn:hover:not(:disabled) {
    background: #f5c870;
  }

  .biz-view.er .submit-btn {
    background: var(--er-pink);
    color: white;
  }

  .biz-view.er .submit-btn:hover:not(:disabled) {
    background: #e02bb8;
  }

  .error-msg {
    font-size: 12px;
    color: #ff6b6b;
    margin-top: 4px;
  }

  .biz-view.er .error-msg {
    color: #d63384;
  }

  .folios-preview {
    font-size: 13px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    margin: -4px 0 14px;
    text-align: center;
    display: none;
  }

  .folios-preview.show {
    display: block;
  }

  .biz-view.ca .folios-preview {
    background: rgba(235,182,84,0.1);
    color: var(--ca-gold);
    border: 1px solid rgba(235,182,84,0.25);
  }

  .biz-view.er .folios-preview {
    background: rgba(243,56,203,0.06);
    color: var(--er-blue);
    border: 1px solid rgba(243,56,203,0.2);
  }

  .folios-preview.warn {
    color: #ff6b6b !important;
    background: rgba(255,107,107,0.08) !important;
    border-color: rgba(255,107,107,0.25) !important;
  }

  .biz-view.er .folios-preview.warn {
    color: #d63384 !important;
  }

  .sync-banner {
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 8px 16px;
    margin: 0;
  }

  .sync-banner.ok {
    background: rgba(46, 204, 113, 0.12);
    color: #2ecc71;
  }

  .sync-banner.warn {
    background: rgba(255, 107, 107, 0.12);
    color: #ff6b6b;
  }

  /* ===== FOLIO (TICKET) ===== */
  .ticket-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ticket {
    width: 100%;
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    margin-bottom: 18px;
  }

  .ticket.ca {
    background: linear-gradient(160deg, #14100c 0%, #221a12 100%);
    border: 1px solid rgba(235,182,84,0.35);
  }

  .ticket.er {
    background: white;
    border: 2px solid var(--er-pink);
  }

  .ticket-top {
    padding: 22px 22px 14px;
    text-align: center;
  }

  .ticket.ca .ticket-top {
    border-bottom: 1px dashed rgba(235,182,84,0.35);
  }

  .ticket.er .ticket-top {
    border-bottom: 2px dashed var(--er-pink);
  }

  .ticket-logo {
    height: 38px;
    object-fit: contain;
    margin: 0 auto 12px;
    display: block;
  }

  .ticket-eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .ticket.ca .ticket-eyebrow { color: var(--ca-gold); }
  .ticket.er .ticket-eyebrow { color: var(--er-pink); }

  .ticket-status {
    font-size: 22px;
    font-weight: 800;
    margin-top: 6px;
  }

  .ticket.ca .ticket-status {
    font-family: 'Playfair Display', serif;
    color: var(--ca-cream);
  }

  .ticket.er .ticket-status {
    font-family: 'Baloo 2', sans-serif;
    color: var(--er-blue);
  }

  .ticket-character {
    width: 110px;
    height: 110px;
    object-fit: cover;
    border-radius: 50%;
    margin: 14px auto 0;
    display: block;
  }

  .ticket.ca .ticket-character {
    border: 3px solid var(--ca-gold);
  }

  .ticket.er .ticket-character {
    border: 3px solid var(--er-pink);
  }

  .ticket-bottom {
    padding: 18px 22px 24px;
  }

  .ticket-folio {
    text-align: center;
    margin-bottom: 16px;
  }

  .ticket-folio .label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 4px;
  }

  .ticket-folio .value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 2px;
  }

  .ticket.ca .ticket-folio .value {
    font-family: 'Playfair Display', serif;
    color: var(--ca-gold);
  }

  .ticket.er .ticket-folio .value {
    font-family: 'Baloo 2', sans-serif;
    color: var(--er-pink);
  }

  .ticket-folio .value.multi {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    font-size: 20px;
  }

  .folio-chip {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 18px;
  }

  .ticket.ca .folio-chip {
    background: rgba(235,182,84,0.12);
    border: 1px solid rgba(235,182,84,0.35);
  }

  .ticket.er .folio-chip {
    background: rgba(243,56,203,0.08);
    border: 1px solid rgba(243,56,203,0.3);
  }

  .folio-count {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .ticket-details {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
  }

  .ticket.ca .detail-row {
    border-bottom: 1px solid rgba(235,182,84,0.15);
  }

  .ticket.er .detail-row {
    border-bottom: 1px solid #f5dff0;
  }

  .detail-row:last-child {
    border-bottom: none;
  }

  .detail-row .k {
    opacity: 0.6;
    font-weight: 500;
  }

  .detail-row .v {
    font-weight: 700;
    text-align: right;
  }

  .ticket.ca .detail-row .v { color: var(--ca-cream); }
  .ticket.er .detail-row .v { color: #2a2a2a; }

  .ticket-footer-note {
    text-align: center;
    font-size: 11px;
    margin-top: 16px;
    opacity: 0.6;
    line-height: 1.5;
  }

  .ticket-notch {
    position: absolute;
    width: 24px;
    height: 24px;
    background: var(--neutral-bg);
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }

  /* notch only relevant when ticket sits on neutral bg - hidden by default since ticket sits inside biz-view */

  .actions {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .action-btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .action-btn.primary.ca {
    background: var(--ca-gold);
    color: var(--ca-black);
  }

  .action-btn.primary.er {
    background: var(--er-pink);
    color: white;
  }

  .action-btn.secondary.ca {
    background: transparent;
    border: 1px solid rgba(235,182,84,0.4);
    color: var(--ca-gold);
  }

  .action-btn.secondary.er {
    background: transparent;
    border: 2px solid var(--er-blue);
    color: var(--er-blue);
  }

  .action-btn.whatsapp {
    background: #25D366;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .action-btn.whatsapp svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .actions {
    flex-wrap: wrap;
  }

  .actions .action-btn {
    min-width: 0;
  }

  @media (max-width: 360px) {
    .actions {
      flex-direction: column;
    }
  }

  .helper-text {
    text-align: center;
    font-size: 12px;
    margin-top: 14px;
    opacity: 0.6;
    line-height: 1.5;
  }

  .copied-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: fadein 0.2s ease;
    z-index: 50;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  @media (max-width: 380px) {
    .ticket-folio .value { font-size: 26px; }
    .promo-banner h2 { font-size: 20px; }
  }

  /* ===== PIN GATE ===== */
  .pin-gate {
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }

  .pin-gate.ca {
    background: linear-gradient(165deg, #1a1410 0%, var(--ca-black) 60%);
    color: var(--ca-cream);
  }

  .pin-gate.er {
    background: var(--er-light);
    color: #2a2a2a;
  }

  .pin-content {
    padding: 36px 28px 32px;
    text-align: center;
  }

  .pin-character {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: block;
  }

  .pin-gate.ca .pin-character {
    border: 3px solid var(--ca-gold);
  }

  .pin-gate.er .pin-character {
    border: 3px solid var(--er-pink);
  }

  .pin-content .biz-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .pin-gate.ca .biz-name {
    font-family: 'Playfair Display', serif;
    color: var(--ca-cream);
  }

  .pin-gate.er .biz-name {
    font-family: 'Baloo 2', sans-serif;
    color: var(--er-blue);
  }

  .pin-content .pin-label {
    font-size: 13px;
    opacity: 0.65;
    margin-bottom: 22px;
  }

  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
  }

  .pin-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid;
    transition: background 0.1s ease;
  }

  .pin-gate.ca .pin-dot {
    border-color: var(--ca-gold);
  }

  .pin-gate.er .pin-dot {
    border-color: var(--er-pink);
  }

  .pin-dot.filled.ca {
    background: var(--ca-gold);
  }

  .pin-dot.filled.er {
    background: var(--er-pink);
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 260px;
    margin: 0 auto;
  }

  .pin-key {
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .pin-gate.ca .pin-key {
    background: rgba(255,255,255,0.07);
    color: var(--ca-cream);
    border: 1px solid rgba(235,182,84,0.2);
  }

  .pin-gate.ca .pin-key:hover {
    background: rgba(235,182,84,0.12);
  }

  .pin-gate.er .pin-key {
    background: white;
    color: var(--er-blue);
    border: 2px solid #e0d8ec;
  }

  .pin-gate.er .pin-key:hover {
    border-color: var(--er-pink);
  }

  .pin-key.empty {
    visibility: hidden;
    pointer-events: none;
  }

  .pin-error {
    font-size: 13px;
    color: #ff6b6b;
    margin-bottom: 14px;
    min-height: 18px;
  }

  .pin-gate.er .pin-error {
    color: #d63384;
  }

  .pin-back {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-top: 24px;
    font-family: inherit;
  }

  .pin-gate.ca .pin-back {
    color: var(--ca-gold);
  }

  .pin-gate.er .pin-back {
    color: var(--er-blue);
  }
</style>
</head>
<body>
<div id="root"></div>

/* ===== CONFIGURACIÓN GOOGLE SHEETS (APPS SCRIPT) ===== */
// Pega aquí la URL de tu Apps Script Web App (termina en /exec).
// Ejemplo: "https://script.google.com/macros/s/AKfycb.../exec"
const API_URL = "https://script.google.com/macros/s/AKfycbwBtb1jXi7nAg81W_8o0noFGiLnpWX0WQ29OKVbmuWXeY9ht2wES6DM8i8E4CW50LcW2Q/exec";

function apiConfigured() {
  return typeof API_URL === 'string' && API_URL.startsWith('http');
}

/**
 * Consulta al Apps Script si un ticket ya fue registrado para el negocio dado.
 * Devuelve { exists: true/false } o { exists: null, error: '...' } si falla
 * (sin conexión, URL no configurada, etc.) para no bloquear el flujo offline.
 */
async function checkTicketDuplicate(biz, ticket) {
  if (!apiConfigured()) return { exists: null, error: 'API no configurada' };
  try {
    const url = `${API_URL}?action=checkTicket&biz=${encodeURIComponent(biz)}&ticket=${encodeURIComponent(ticket)}`;
    const res = await fetch(url, { method: 'GET' });
    const data = await res.json();
    if (data && typeof data.exists === 'boolean') {
      return { exists: data.exists };
    }
    return { exists: null, error: data && data.error ? data.error : 'Respuesta inválida' };
  } catch (err) {
    return { exists: null, error: err.message || 'Sin conexión' };
  }
}

/**
 * Envía el registro al Google Sheet vía Apps Script.
 * Devuelve { ok: true } o { ok: false, error/duplicate, message }.
 * Si la API no está configurada o no hay conexión, devuelve
 * { ok: false, offline: true } para que la app pueda continuar sin bloquear.
 */
async function sendRegistroToSheet(payload) {
  if (!apiConfigured()) return { ok: false, offline: true, error: 'API no configurada' };
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    return data;
  } catch (err) {
    return { ok: false, offline: true, error: err.message || 'Sin conexión' };
  }
}

function pad(num) {
  return String(num).padStart(3, '0');
}

function formatFecha(date) {
  const opts = { day: '2-digit', month: 'short', year: 'numeric' };
  const fecha = date.toLocaleDateString('es-MX', opts);
  const hora = date.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  return { fecha, hora };
}

        </div>
      </button>
    </div>
  `;

  wrap.querySelectorAll('.biz-card').forEach(btn => {
    btn.addEventListener('click', () => {
      state.biz = btn.dataset.biz;
      state.unlocked = false;
      state.view = 'form';
      render();
    });
  });

  return wrap;
}

/* ===== PIN GATE ===== */
function renderPinGate() {
  const biz = state.biz;
  const isCA = biz === 'ca';
  const character = isCA ? ASSETS.donChuy : ASSETS.chanchito;
  const bizName = isCA ? 'Casa Arciniega' : 'Super El Rendidor';

  const wrap = document.createElement('div');
  wrap.className = `pin-gate ${biz}`;

  let pin = '';
  let errorMsg = '';

  wrap.innerHTML = `
    <div class="pin-content">
      <img class="pin-character" src="${character}" alt="">
      <div class="biz-name">${bizName}</div>
      <div class="pin-label">Ingresa el PIN de acceso</div>
      <div class="pin-dots"></div>
      <div class="pin-error"></div>
      <div class="pin-pad"></div>
      <button class="pin-back">&larr; Cambiar negocio</button>
    </div>
  `;

  const dotsEl = wrap.querySelector('.pin-dots');
  const errorEl = wrap.querySelector('.pin-error');
  const padEl = wrap.querySelector('.pin-pad');
  const backBtn = wrap.querySelector('.pin-back');

  function renderDots() {
    dotsEl.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const dot = document.createElement('div');
      dot.className = `pin-dot ${i < pin.length ? `filled ${biz}` : ''}`;
      dotsEl.appendChild(dot);
    }
  }

  function checkPin() {
    if (pin === PINS[biz]) {
      setTimeout(() => {
        state.unlocked = true;
        render();
      }, 150);
    } else {
      errorEl.textContent = 'PIN incorrecto. Intenta de nuevo.';
      setTimeout(() => {
        pin = '';
        renderDots();
      }, 500);
    }
  }

  const keys = ['1','2','3','4','5','6','7','8','9','del','0','ok'];
  keys.forEach(k => {
    const btn = document.createElement('button');
    if (k === 'del') {
      btn.className = 'pin-key';
      btn.innerHTML = '&#9003;';
      btn.addEventListener('click', () => {
        errorEl.textContent = '';
        pin = pin.slice(0, -1);
        renderDots();
      });
    } else if (k === 'ok') {
      btn.className = 'pin-key empty';
      btn.tabIndex = -1;
    } else {
      btn.className = 'pin-key';
      btn.textContent = k;
      btn.addEventListener('click', () => {
        if (pin.length >= 4) return;
        errorEl.textContent = '';
        pin += k;
        renderDots();
        if (pin.length === 4) {
          checkPin();
        }
      });
    }
    padEl.appendChild(btn);
  });

  backBtn.addEventListener('click', () => {
    state.biz = null;
    state.unlocked = false;
    state.view = 'form';
    render();
  });

  renderDots();
  return wrap;
}

/* ===== FORMULARIO DE REGISTRO ===== */
function renderRegistroForm() {
  const biz = state.biz;
  const isCA = biz === 'ca';
  const logo = isCA ? ASSETS.logoCA : ASSETS.logoER;
  const bizName = isCA ? 'Casa Arciniega' : 'Super El Rendidor';

  const wrap = document.createElement('div');
  wrap.className = `biz-view ${biz}`;

  wrap.innerHTML = `
    <div class="topbar">
      <button class="back-btn">&larr; Cambiar negocio</button>
      <img class="topbar-logo" src="${logo}" alt="${bizName}">
    </div>
    <div class="content">
      <div class="promo-banner">
        <div class="eyebrow">Promo Mundial</div>
        <h2>Registro de participante</h2>
        <div class="sub">Por cada $150 de compra, 1 folio de participación</div>
      </div>

      <form>
        <div class="form-group">
          <label for="nombre">Nombre del cliente</label>
          <input id="nombre" type="text" placeholder="Ej. María González López">
        </div>
        <div class="form-group">
          <label for="whatsapp">Número de WhatsApp</label>
          <input id="whatsapp" type="tel" placeholder="Ej. 712 123 4567">
        </div>
        <div class="form-group">
          <label for="ticket">Número de ticket</label>
          <input id="ticket" type="text" placeholder="Ej. 0048291">
        </div>
        <div class="form-group">
          <label for="monto">Monto de compra ($)</label>
          <input id="monto" type="number" inputmode="decimal" min="0" step="1" placeholder="Ej. 350">
        </div>
        <div class="folios-preview" id="folios-preview"></div>
        <div class="error-msg" id="form-error"></div>
        <button type="submit" class="submit-btn">Registrar y generar folio(s)</button>
      </form>

      <div class="helper-text">
        La fecha y hora se registran automáticamente al enviar.
      </div>
    </div>
  `;

  wrap.querySelector('.back-btn').addEventListener('click', () => {
    state.biz = null;
    state.unlocked = false;
    state.view = 'form';
    render();
  });

  const form = wrap.querySelector('form');
  const errorEl = wrap.querySelector('#form-error');
  const montoInput = wrap.querySelector('#monto');
  const previewEl = wrap.querySelector('#folios-preview');

  function updatePreview() {
    const monto = parseFloat(montoInput.value);
    if (!monto || monto <= 0) {
      previewEl.textContent = '';
      previewEl.classList.remove('show');
      return;
    }
    const folios = Math.floor(monto / 150);
    previewEl.classList.add('show');
    if (folios === 0) {
      previewEl.textContent = 'Esta compra no alcanza los $150 mínimos para generar un folio.';
      previewEl.classList.add('warn');
    } else {
      previewEl.classList.remove('warn');
      previewEl.textContent = folios === 1
        ? 'Esta compra genera 1 folio de participación.'
        : `Esta compra genera ${folios} folios de participación.`;
    }
  }

  montoInput.addEventListener('input', updatePreview);

  const submitBtn = wrap.querySelector('.submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nombre = wrap.querySelector('#nombre').value.trim();
    const whatsapp = wrap.querySelector('#whatsapp').value.trim();
    const ticket = wrap.querySelector('#ticket').value.trim();
    const monto = parseFloat(montoInput.value);

    if (!nombre || !whatsapp || !ticket || !monto) {
      errorEl.textContent = 'Completa todos los campos para continuar.';
      return;
    }
    if (whatsapp.length < 10) {
      errorEl.textContent = 'El número de WhatsApp debe tener al menos 10 dígitos.';
      return;
    }
    const folios = Math.floor(monto / 150);
    if (folios === 0) {
      errorEl.textContent = 'La compra debe ser de al menos $150 para generar un folio.';
      return;
    }
    errorEl.textContent = '';

    // ===== VALIDACIÓN DE TICKET DUPLICADO (PER NEGOCIO) =====
    submitBtn.disabled = true;
    submitBtn.textContent = 'Verificando ticket...';

    const dupCheck = await checkTicketDuplicate(biz, ticket);

    if (dupCheck.exists === true) {
      errorEl.textContent = `Este ticket ya fue registrado para ${bizName}. No se puede generar otro folio.`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Registrar y generar folio(s)';
      return;
    }
    // Si dupCheck.exists === null (sin conexión / API no configurada),
    // se permite continuar para no bloquear el flujo en tienda.

    submitBtn.textContent = 'Registrando...';

    const timestamp = new Date();
    const folioNums = [];
    for (let i = 0; i < folios; i++) {
      state.counters[biz] += 1;
      folioNums.push(state.counters[biz]);
    }

    const prefix = biz === 'ca' ? 'CA' : 'ER';
    const folioStrings = folioNums.map(n => `${prefix}-${pad(n)}`);
    const { fecha, hora } = formatFecha(timestamp);

    // ===== ENVÍO AL GOOGLE SHEET =====
    const syncResult = await sendRegistroToSheet({
      biz, nombre, whatsapp, ticket, monto,
      folios: folioStrings,
      fecha, hora
    });

    if (syncResult.ok) {
      state.syncStatus = 'synced';
    } else if (syncResult.duplicate || syncResult.error === 'duplicate') {
      // El servidor detectó el duplicado justo antes de guardar
      // (otro celular registró el mismo ticket al mismo tiempo).
      errorEl.textContent = `Este ticket ya fue registrado para ${bizName}. No se puede generar otro folio.`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Registrar y generar folio(s)';
      // Revertir el contador ya que no se generó el folio
      state.counters[biz] -= folios;
      return;
    } else if (syncResult.offline) {
      state.syncStatus = 'offline';
    } else {
      state.syncStatus = 'error';
    }

    state.lastData = {
      nombre, whatsapp, ticket, monto,
      timestamp,
      folioNums
    };
    state.view = 'ticket';
    render();
  });

  return wrap;
}

/* ===== FOLIO (TICKET) ===== */
function renderFolioTicket() {
  const biz = state.biz;
  const data = state.lastData;
  const folioNums = data.folioNums;
  const isCA = biz === 'ca';
  const logo = isCA ? ASSETS.logoCA : ASSETS.logoER;
  const character = isCA ? ASSETS.donChuy : ASSETS.chanchito;
  const prefix = isCA ? 'CA' : 'ER';
  const { fecha, hora } = formatFecha(data.timestamp);

  const isMultiple = folioNums.length > 1;
  const folioLabel = isMultiple ? 'Folios' : 'Folio';
  const folioValues = folioNums.map(n => `${prefix}-${pad(n)}`);

  const wrap = document.createElement('div');
  wrap.className = `biz-view ${biz}`;

  const folioValueHtml = isMultiple
    ? `<div class="value multi">${folioValues.map(v => `<span class="folio-chip">${v}</span>`).join('')}</div>`
    : `<div class="value">${folioValues[0]}</div>`;

  let syncBannerHtml = '';
  if (state.syncStatus === 'offline' || state.syncStatus === 'error') {
    syncBannerHtml = `
      <div class="sync-banner warn">
        ⚠️ No se pudo guardar este registro en Google Sheets (sin conexión o configuración pendiente).
        El folio es válido, pero recuerda registrar este ticket manualmente cuando recuperes la conexión.
      </div>`;
  } else if (state.syncStatus === 'synced') {
    syncBannerHtml = `
      <div class="sync-banner ok">
        ✅ Registro guardado correctamente en Google Sheets.
      </div>`;
  }

  wrap.innerHTML = `
    <div class="topbar">
      <button class="back-btn">&larr; Cambiar negocio</button>
      <img class="topbar-logo" src="${logo}" alt="">
    </div>
    ${syncBannerHtml}
    <div class="content">
      <div class="ticket-wrap">
        <div class="ticket ${biz}" id="ticket-capture">
          <div class="ticket-top">
            <img class="ticket-logo" src="${logo}" alt="">
            <div class="ticket-eyebrow">Promo Mundial</div>
            <div class="ticket-status">¡Ya estás participando!</div>
            <img class="ticket-character" src="${character}" alt="">
          </div>
          <div class="ticket-bottom">
            <div class="ticket-folio">
              <div class="label">${folioLabel}</div>
              ${folioValueHtml}
              ${isMultiple ? `<div class="folio-count">${folioNums.length} folios generados</div>` : ''}
            </div>
            <div class="ticket-details">
              <div class="detail-row">
                <span class="k">Nombre</span>
                <span class="v">${escapeHtml(data.nombre)}</span>
              </div>
              <div class="detail-row">
                <span class="k">Ticket</span>
                <span class="v">${escapeHtml(data.ticket)}</span>
              </div>
              <div class="detail-row">
                <span class="k">Monto</span>
                <span class="v">$${data.monto.toLocaleString('es-MX')}</span>
              </div>
              <div class="detail-row">
                <span class="k">Fecha</span>
                <span class="v">${fecha}</span>
              </div>
              <div class="detail-row">
                <span class="k">Hora</span>
                <span class="v">${hora}</span>
              </div>
            </div>
            <div class="ticket-footer-note">
              Conserva ${isMultiple ? 'estos folios' : 'este folio'}. Los ganadores se anunciarán en redes sociales.
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="action-btn secondary ${biz}" id="btn-new">Nuevo registro</button>
          <button class="action-btn primary ${biz}" id="btn-copy">Copiar folio${isMultiple ? 's' : ''}</button>
          <button class="action-btn whatsapp" id="btn-whatsapp">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.151-.15.353-.39.529-.586.176-.196.234-.336.351-.56.118-.225.06-.418-.034-.59-.092-.165-.789-1.893-1.062-2.59-.272-.69-.547-.595-.751-.605-.195-.01-.42-.012-.643-.012-.224 0-.589.084-.886.422-.297.337-1.137 1.111-1.137 2.703 0 1.593 1.16 3.13 1.32 3.349.16.219 2.224 3.387 5.39 4.612 2.687 1.034 3.235.83 3.825.778.59-.052 1.91-.78 2.176-1.535.266-.755.266-1.4.187-1.535-.08-.135-.297-.213-.594-.36z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.892.524 3.66 1.432 5.168L2 22l4.964-1.42A9.953 9.953 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18.182c-1.683 0-3.255-.461-4.604-1.262l-.33-.196-3.07.878.892-2.998-.213-.34A8.156 8.156 0 0 1 3.818 12c0-4.515 3.667-8.182 8.182-8.182 4.515 0 8.182 3.667 8.182 8.182 0 4.515-3.667 8.182-8.182 8.182z"/></svg>
            WhatsApp
          </button>
        </div>
        <div class="helper-text">
          Toma captura de pantalla de ${isMultiple ? 'estos folios' : 'este folio'} y envíala al cliente por WhatsApp.
        </div>
      </div>
    </div>
  `;

  wrap.querySelector('.back-btn').addEventListener('click', () => {
    state.biz = null;
    state.unlocked = false;
    state.view = 'form';
    render();
  });

  wrap.querySelector('#btn-new').addEventListener('click', () => {
    state.view = 'form';
    render();
  });

  wrap.querySelector('#btn-copy').addEventListener('click', () => {
    const text = isMultiple
      ? `Folios ${folioValues.join(', ')} - ¡Ya estás participando en la Promo Mundial!`
      : `Folio ${folioValues[0]} - ¡Ya estás participando en la Promo Mundial!`;
    const showToast = () => {
      const toast = document.createElement('div');
      toast.className = 'copied-toast';
      toast.textContent = isMultiple ? 'Folios copiados' : 'Folio copiado';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showToast).catch(() => {
        fallbackCopy(text);
        showToast();
      });
    } else {
      fallbackCopy(text);
      showToast();
    }
  });

  wrap.querySelector('#btn-whatsapp').addEventListener('click', () => {
    const bizDisplayName = isCA ? 'Casa Arciniega' : 'Super El Rendidor';
    const folioText = isMultiple
      ? `tus folios son: ${folioValues.join(', ')}`
      : `tu folio es: ${folioValues[0]}`;

    const message = `¡Hola ${data.nombre}! 🇲🇽 Gracias por tu compra en ${bizDisplayName}.\n\n${folioText}\n\n¡Ya estás participando en la Promo Mundial! Conserva este mensaje, los ganadores se anunciarán en nuestras redes sociales. ¡Mucha suerte! 🏆`;

    const digits = data.whatsapp.replace(/\D/g, '');
    const phone = digits.length === 10 ? `52${digits}` : digits;

    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
  });

  return wrap;
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ===== INICIO ===== */
render();

</script>
